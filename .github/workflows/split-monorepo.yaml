name: Split Monorepo

on:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  split_monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - conversation
          - admin
          - flat
          - page-scanner
          - page-update-notifier
          - search
          - snippet
          - static-generator
          - template-editor
          - skeleton
          - svg
          - installer
          - js-helper
          - version
          - new
          - admin-block-editor
          - advanced-main-image
          - api
          - quiz
          - docs

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - # Uses an action in the root directory
        name: Monorepo Split of ${{ matrix.package }}
        uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: "packages/${{ matrix.package }}"
          repository_organization: "pushword"
          repository_name: "${{ matrix.package }}"
          # Only tag on a genuine tag push, with the exact tag pushed.
          # On branch pushes the tag is empty so the action skips tagging
          # (re-applying an existing tag is fatal under v2.4.5 — no --force).
          tag: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          user_name: "RobinDev"
          user_email: "contact@piedweb.com"

  test_installer:
    needs: split_monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Trigger next workflow
        if: success()
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: ${{ github.repository }}
          event-type: after-split-monorepo
