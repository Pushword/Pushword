name: Split Monorepo

on:
  # Release-driven: split once per tag (see /tagAndPush -> .scripts/release).
  # Also triggering on branch pushes would fire a second, concurrent run that
  # races the tag run when pushing content to the same mirror — and, because the
  # action pushes content before tagging, the loser can die before applying the
  # tag, leaving a changed package un-tagged. Tag-only = one run per release,
  # content + tag together, no race.
  push:
    tags:
      - "*"

jobs:
  split_monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - conversation
          - admin
          - flat
          - page-scanner
          - page-update-notifier
          - search
          - snippet
          - static-generator
          - template-editor
          - skeleton
          - installer
          - js-helper
          - version
          - new
          - admin-block-editor
          - advanced-main-image
          - api
          - quiz
          - docs

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - # Uses an action in the root directory
        name: Monorepo Split of ${{ matrix.package }}
        uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: "packages/${{ matrix.package }}"
          repository_organization: "pushword"
          repository_name: "${{ matrix.package }}"
          # The workflow only runs on tag pushes, so this is always the
          # newly-pushed tag (re-applying an existing tag is fatal under
          # v2.4.5 — no --force — which is why a new tag per release is key).
          tag: ${{ github.ref_name }}
          user_name: "RobinDev"
          user_email: "contact@piedweb.com"

  test_installer:
    needs: split_monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Trigger next workflow
        if: success()
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: ${{ github.repository }}
          event-type: after-split-monorepo
