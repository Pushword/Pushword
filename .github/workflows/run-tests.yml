name: Tests

on: [push, pull_request]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.5, 8.4]

    name: PHPStan - PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          composer-options: --prefer-dist --prefer-stable --no-interaction

      - name: Build container
        # cache:warmup dumps App_KernelDevDebugContainer.xml that phpstan-symfony
        # reads (see phpstan.dist.neon); cache:clear warms then drops that XML.
        run: cd packages/skeleton && php ./bin/console cache:warmup --env=dev

      - name: PHPStan
        run: vendor/bin/phpstan --memory-limit=1G analyse --error-format=github

  js-quality:
    runs-on: ubuntu-latest
    name: JS Type-check, Lint & Editor tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root tooling (eslint, typescript)
        run: yarn install --frozen-lockfile

      - name: Install admin-block-editor dependencies
        run: cd packages/admin-block-editor && yarn install --frozen-lockfile

      - name: Type-check (whole monorepo)
        run: yarn type-check

      - name: Lint admin-block-editor (errors fail the build; any/@ts-ignore are warnings)
        run: yarn eslint packages/admin-block-editor/src --quiet

      - name: Editor unit tests
        run: cd packages/admin-block-editor && yarn test

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      #fail-fast: true
      matrix:
        os: [ubuntu-latest] #, windows-latest
        php: [8.4, 8.5]
        node: [25, 24]
        stability: [prefer-stable]
        # exclude:
        #   - php: 8.5
        #     node: 24

    name: P${{ matrix.php }} - N${{ matrix.node }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, xdebug
          #coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Install image optimization tools
        run: sudo apt-get update && sudo apt-get install -y ghostscript qpdf

      #- name: Install browsers
      #  run: vendor/bin/bdi detect drivers
      - name: Initialize
        run: composer reset-skeleton

      - name: Generate Images Cache
        run: cd packages/skeleton && php bin/console pw:image:cache

      - name: Execute tests
        # The 'serial' group holds tests that need exclusive access to the shared
        # public/media variant dir (not per-worker isolatable); run them sequentially
        # after the parallel batch so concurrent workers can't mutate it underneath them.
        # The 'worker' group runs in its own step below (it shares a cache.app version
        # counter that parallel workers would race).
        run: |
          vendor/bin/paratest --processes=auto --coverage-clover coverage.xml --exclude-group=panther --exclude-group=benchmark --exclude-group=serial --exclude-group=worker
          vendor/bin/paratest --processes=1 --group=serial
        env:
          TEST_RUN_ID: ci-${{ github.run_id }}

      - name: Worker-mode safety guard
        # Simulates a long-running worker (FrankenPHP `worker` / Symfony Runtime) reusing
        # one kernel across requests: asserts the repositories' in-memory caches (slug /
        # redirect maps, media filename index) don't serve stale data after a write in a
        # prior request. A dedicated, named check keeps this non-obvious invariant visible.
        run: vendor/bin/paratest --processes=1 --group=worker
        env:
          TEST_RUN_ID: ci-${{ github.run_id }}

      - name: Send coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  test-mariadb:
    runs-on: ubuntu-latest

    name: MariaDB - P8.4 - N24

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: pecl
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, pdo_mysql, mysqli, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Install image optimization tools
        run: sudo apt-get update && sudo apt-get install -y ghostscript qpdf

      - name: Create test database user
        run: |
          mysql -h127.0.0.1 -uroot -proot -e "CREATE USER IF NOT EXISTS 'pushword'@'%' IDENTIFIED BY 'pushword'; GRANT ALL PRIVILEGES ON \`pushword\_test%\`.* TO 'pushword'@'%'; FLUSH PRIVILEGES;"

      - name: Initialize
        run: composer reset-skeleton

      - name: Generate Images Cache
        run: cd packages/skeleton && php bin/console pw:image:cache

      - name: Execute tests
        # Serial group runs after the parallel batch — see the SQLite job above.
        run: |
          vendor/bin/paratest --processes=auto --exclude-group=panther --exclude-group=benchmark --exclude-group=serial
          vendor/bin/paratest --processes=1 --group=serial
        env:
          TEST_RUN_ID: ci-mariadb-${{ github.run_id }}
          PUSHWORD_TEST_MYSQL_URL: "mysql://pushword:pushword@127.0.0.1:3306/pushword_test?serverVersion=11.8.6-MariaDB&charset=utf8mb4"
